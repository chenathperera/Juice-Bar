<section class="add-juice-page">
  <div class="page-header">
    <p class="eyebrow">FreshSip Menu</p>
    <h1>Add a New Juice</h1>
    <p>Create a juice and save it to the SQL database through the API.</p>
  </div>

  <div class="form-card">
    <div *ngIf="backendValidationErrors.length > 0" class="status-message error">
      <p>Please fix the following validation errors:</p>
      <ul>
        <li *ngFor="let error of backendValidationErrors">{{ error }}</li>
      </ul>
    </div>

    <form #juiceForm="ngForm" (ngSubmit)="submitForm(juiceForm)" novalidate>
      <div class="form-group">
        <label for="name">Name</label>
        <input
          id="name"
          name="name"
          type="text"
          [(ngModel)]="juiceFormData.name"
          #name="ngModel"
          required
        />
        <p *ngIf="name.invalid && name.touched" class="validation-message">
          Name is required.
        </p>
      </div>

      <div class="form-group">
        <label for="description">Description</label>
        <textarea
          id="description"
          name="description"
          rows="4"
          [(ngModel)]="juiceFormData.description"
        ></textarea>
      </div>

      <div class="form-group">
        <label for="price">Price</label>
        <input
          id="price"
          name="price"
          type="number"
          min="0.01"
          step="0.01"
          [(ngModel)]="juiceFormData.price"
          #price="ngModel"
          required
        />
        <p *ngIf="price.errors?.['required'] && price.touched" class="validation-message">
          Price is required.
        </p>
        <p *ngIf="price.errors?.['min'] && price.touched" class="validation-message">
          Price must be greater than 0.
        </p>
      </div>

      <div class="form-group">
        <label for="imageUrl">Image URL</label>
        <input
          id="imageUrl"
          name="imageUrl"
          type="text"
          [(ngModel)]="juiceFormData.imageUrl"
        />
      </div>

      <div class="checkbox-row">
        <input
          id="isAvailable"
          name="isAvailable"
          type="checkbox"
          [(ngModel)]="juiceFormData.isAvailable"
        />
        <label for="isAvailable">Available now</label>
      </div>

      <p *ngIf="isSaving" class="status-message">Saving juice...</p>
      <p *ngIf="errorMessage" class="status-message error">{{ errorMessage }}</p>

      <div class="button-row">
        <button type="submit" [disabled]="isSaving">Save Juice</button>
        <a routerLink="/juices" class="secondary-link">Back to Juices</a>
      </div>
    </form>
  </div>
</section>
