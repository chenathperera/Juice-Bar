<section class="add-category-page">
  <div class="page-header">
    <p class="eyebrow">FreshSip Categories</p>
    <h1>Add a New Category</h1>
    <p>Create a category and save it through the API.</p>
  </div>

  <div class="form-card">
    <form #categoryForm="ngForm" (ngSubmit)="submitForm(categoryForm)" novalidate>
      <div class="form-group">
        <label for="name">Name</label>
        <input
          id="name"
          name="name"
          type="text"
          [(ngModel)]="categoryFormData.name"
          #name="ngModel"
          required
        />
        <p *ngIf="name.invalid && name.touched" class="validation-message">
          Name is required.
        </p>
      </div>

      <div class="form-group">
        <label for="description">Description</label>
        <textarea
          id="description"
          name="description"
          rows="4"
          [(ngModel)]="categoryFormData.description"
        ></textarea>
      </div>

      <div class="form-group">
        <label for="imageFile">Category Image</label>
        <input
          id="imageFile"
          name="imageFile"
          type="file"
          accept=".png,.jpg,.jpeg,.webp,image/png,image/jpeg,image/webp"
          (change)="onImageSelected($event)"
        />
        <p class="file-help">{{ selectedImageName }}</p>
        <div *ngIf="previewImageUrl" class="image-preview">
          <img [src]="previewImageUrl" alt="Selected category image preview">
        </div>
      </div>

      <p *ngIf="isSaving" class="status-message">Saving category...</p>
      <p *ngIf="errorMessage" class="status-message error">{{ errorMessage }}</p>

      <div class="button-row">
        <button type="submit" [disabled]="isSaving">Save Category</button>
        <a routerLink="/admin/categories" class="secondary-link">Back to Categories</a>
      </div>
    </form>
  </div>
</section>
