<div class="page">
  <main class="hero" id="home">
    <div class="hero-text">
      <p class="tagline">Fresh fruit. Bright flavors. Simple code.</p>
      <h1>Welcome to {{ title }}</h1>
      <p class="description">
        This is the first step of our juice bar app. The homepage is built with
        Angular and it talks to the ASP.NET Core Web API.
      </p>
      <a class="menu-button" routerLink="/menu">View Menu</a>
    </div>

    <div class="status-card">
      <h2>API Status</h2>
      <p>{{ apiStatus }}</p>
    </div>
  </main>

  <section class="menu-preview">
    <h2>Coming Soon</h2>
    <p>Our juice menu will be added in the next steps.</p>
  </section>
</div>
