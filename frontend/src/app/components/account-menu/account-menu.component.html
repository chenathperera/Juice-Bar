<div class="account-menu" (click)="$event.stopPropagation()">
  <button class="icon-btn account-icon-btn" type="button" aria-label="Account" (click)="toggleMenu($event)">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <circle cx="12" cy="8" r="4"></circle>
      <path d="M4 21c1.8-3.6 5-5.5 8-5.5S18.2 17.4 20 21"></path>
    </svg>
  </button>

  <div *ngIf="isOpen" class="account-dropdown">
    <button *ngIf="!isLoggedIn" type="button" (click)="navigateTo('/login')">Login</button>
    <button *ngIf="!isLoggedIn" type="button" (click)="navigateTo('/register')">Register</button>
    <button *ngIf="isLoggedIn" type="button" (click)="navigateTo('/profile')">My Profile</button>
    <button type="button" (click)="navigateTo('/track-order')">Track Order</button>
    <button *ngIf="isLoggedIn" type="button" (click)="logout()">Logout</button>
  </div>
</div>
